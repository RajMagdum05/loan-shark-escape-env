name: loan-shark-escape-env
version: "1.0.0"
description: >
  A predatory lending escape RL environment. An agent must make monthly
  financial decisions to escape a debt trap before hitting the spiral lock
  point of no return. Simulates real-world predatory loan dynamics with
  weekly compounding fees, escape routes, and income shocks.
author: your-name
tags:
  - finance
  - openenv
  - reinforcement-learning
  - social-impact
app_port: 8000
base_path: /docs
sdk: docker
tasks:
  - id: lse-easy
    description: One predatory loan, credit union always available
  - id: lse-medium
    description: Two loans, tight budget, escape window limited
  - id: lse-hard
    description: Three loans, income shocks, no credit union
