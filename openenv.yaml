spec_version: 1
name: loan_shark_escape_env
type: space
runtime: fastapi
app: server.app:app
app_port: 7860

version: "1.0.0"
description: >
  A predatory lending escape RL environment. The agent must make sequential
  monthly decisions to escape a debt trap before hitting a spiral-lock state.
author: rehan
tags:
  - finance
  - openenv
  - reinforcement-learning
  - social-impact
tasks:
  - id: lse-easy
    description: One predatory loan, credit union always available
  - id: lse-medium
    description: Two loans, tight budget, escape window limited
  - id: lse-hard
    description: Three loans, income shocks, no credit union
