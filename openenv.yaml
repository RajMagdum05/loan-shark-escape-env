spec_version: 1
name: loan_shark_escape_env
type: space
runtime: fastapi
app: server.app:app
app_port: 7860

version: "1.0.0"
description: >
  A predatory lending escape RL environment. The agent must make sequential
  monthly decisions to escape a debt trap before hitting a spiral-lock state.
author: rehan
tags:
  - finance
  - openenv
  - reinforcement-learning
  - social-impact
tasks:
  - id: lse-easy
    description: Lower debt, higher income; NGO + credit-union refinance available
  - id: lse-medium
    description: Higher debt, tighter budget; same tools as easy (harder numbers)
  - id: lse-hard
    description: Highest debt, lowest income, random shocks; no refinance (no credit union)
